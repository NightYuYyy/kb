<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB — 个人知识库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
/* ── Soft Dark Design ── */
:root {
  --canvas: #1a1a1a;
  --canvas-soft: #1e1e1e;
  --surface: #242424;
  --surface-strong: #2e2e2e;
  --hairline: #2e2e2e;
  --hairline-soft: #333333;
  --hairline-strong: #3a3a3a;
  --ink: #e4e4e4;
  --ink-secondary: #b0b0b0;
  --ink-muted: #808080;
  --ink-soft: #606060;
  --primary: #f56e3a;
  --primary-hover: #e05a28;
  --green: #4ec992;
  --red: #f0616b;
  --yellow: #e0a840;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font); background: var(--canvas); color: var(--ink-secondary);
  height: 100vh; overflow: hidden; display: flex; font-size: 14px;
  line-height: 1.6; -webkit-font-smoothing: antialiased;
}

/* ── 侧栏 ── */
.sidebar {
  width: 280px; min-width: 280px; background: var(--canvas-soft);
  border-right: 1px solid var(--hairline);
  display: flex; flex-direction: column; height: 100vh;
}
.sidebar-header {
  padding: 24px 20px 16px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.sidebar-header h1 {
  font-size: 18px; font-weight: 600; color: var(--ink);
  letter-spacing: -0.3px;
}
.sidebar-header .count {
  font-size: 13px; color: var(--ink-muted); font-weight: 400;
}
.sidebar-search {
  padding: 0 16px 14px;
}
.sidebar-search .search-wrap {
  display: flex; align-items: center; background: var(--surface);
  border: 1px solid var(--hairline-strong); border-radius: var(--radius-md);
  padding: 0 12px; height: 38px; transition: border-color 0.15s;
}
.sidebar-search .search-wrap:focus-within {
  border-color: var(--primary); box-shadow: 0 0 0 2px rgba(245,78,0,0.1);
}
.sidebar-search input {
  flex: 1; background: none; border: none; color: var(--ink);
  font-family: var(--font); font-size: 14px; outline: none;
}
.sidebar-search input::placeholder { color: var(--ink-soft); }
.sidebar-search kbd {
  font-size: 11px; color: var(--ink-soft); font-family: var(--font-mono);
  background: var(--surface-strong); padding: 2px 6px; border-radius: 4px;
  border: 1px solid var(--hairline);
}
.entry-list { flex: 1; overflow-y: auto; }
.entry-item {
  padding: 12px 20px; cursor: pointer; transition: background 0.1s;
  border-left: 2px solid transparent;
}
.entry-item:hover { background: rgba(0,0,0,0.02); }
.entry-item.active {
  background: rgba(245,78,0,0.04); border-left-color: var(--primary);
}
.entry-item .title {
  font-size: 14px; font-weight: 500; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -0.1px;
}
.entry-item .meta {
  font-size: 12px; color: var(--ink-muted); margin-top: 2px;
  display: flex; gap: 6px; align-items: center;
}
.entry-item .tags { color: var(--green); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-item .id { flex-shrink: 0; }
.entry-item .score { color: var(--primary); flex-shrink: 0; font-weight: 500; }

/* ── 主区域 ── */
.main {
  flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
.toolbar {
  height: 52px; padding: 0 28px; border-bottom: 1px solid var(--hairline);
  display: flex; align-items: center; gap: 2px; flex-shrink: 0; background: var(--canvas-soft);
}
.tab-btn {
  padding: 6px 16px; background: none; color: var(--ink-secondary); border: none;
  border-radius: var(--radius-sm); cursor: pointer; font-size: 14px;
  font-family: var(--font); font-weight: 500; transition: all 0.1s;
}
.tab-btn:hover { background: var(--surface-strong); color: var(--ink); }
.tab-btn.active { background: var(--surface); color: var(--ink); }
.toolbar .spacer { flex: 1; }
.toolbar .hint { font-size: 12px; color: var(--ink-soft); }

.main-content { flex: 1; overflow-y: auto; padding: 40px 48px; }

/* ── 问答 ── */
.ask-card {
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px;
}
.ask-card textarea {
  width: 100%; padding: 0; background: none; color: var(--ink);
  border: none; font-family: var(--font); font-size: 16px; resize: none;
  min-height: 32px; outline: none; line-height: 1.7;
}
.ask-card textarea::placeholder { color: var(--ink-soft); }
.ask-row { display: flex; gap: 10px; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--hairline-soft); }
.btn {
  padding: 8px 20px; border-radius: var(--radius-md); font-size: 14px;
  font-family: var(--font); font-weight: 500; cursor: pointer; border: none;
  transition: all 0.15s; height: 36px; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-ghost { background: var(--surface); color: var(--ink-secondary); border: 1px solid var(--hairline-strong); }
.btn-ghost:hover { background: var(--canvas-soft); color: var(--ink); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(207,45,86,0.2); }
.btn-danger:hover { background: rgba(207,45,86,0.06); }

.answer-block {
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: var(--radius-lg); padding: 32px 36px; margin-bottom: 24px;
  line-height: 1.8; color: var(--ink-secondary); font-size: 15px;
}
.answer-block h1,.answer-block h2,.answer-block h3 {
  color: var(--ink); margin: 24px 0 12px; font-weight: 600; letter-spacing: -0.2px;
}
.answer-block h2 { font-size: 18px; padding-bottom: 8px; border-bottom: 1px solid var(--hairline); }
.answer-block h3 { font-size: 16px; }
.answer-block code {
  background: var(--canvas); padding: 2px 6px; border-radius: 4px;
  font-size: 13px; font-family: var(--font-mono); color: var(--primary-hover);
  border: 1px solid var(--hairline);
}
.answer-block pre {
  background: var(--canvas); border: 1px solid var(--hairline);
  border-radius: var(--radius-md); padding: 18px 22px; margin: 14px 0;
  line-height: 1.55; overflow-x: auto;
}
.answer-block pre code {
  background: none; padding: 0; border: none; font-size: 13px;
  white-space: pre-wrap; word-break: break-all; color: var(--ink-secondary);
}
.answer-block p { margin: 10px 0; }
.answer-block ul,.answer-block ol { padding-left: 24px; margin: 8px 0; }
.answer-block li { margin: 4px 0; }
.answer-block strong { color: var(--ink); font-weight: 600; }
.source-label {
  font-size: 12px; color: var(--ink-soft); margin-bottom: 10px;
  font-weight: 500; letter-spacing: 0.3px;
}
.source-card {
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: var(--radius-md); padding: 14px 20px; margin-bottom: 8px;
  cursor: pointer; transition: border-color 0.1s;
}
.source-card:hover { border-color: var(--primary); }
.source-card .s-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.source-card .s-score { color: var(--primary); font-size: 12px; font-weight: 500; }
.source-card .s-preview { font-size: 13px; color: var(--ink-muted); margin-top: 6px; }

/* ── 录入 ── */
.add-form textarea {
  width: 100%; padding: 18px; background: var(--surface); color: var(--ink);
  border: 1px solid var(--hairline-strong); border-radius: var(--radius-lg); font-size: 14px;
  font-family: var(--font-mono); resize: vertical; min-height: 200px; outline: none;
  line-height: 1.8; transition: border-color 0.15s;
}
.add-form textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(245,78,0,0.1); }
.add-form textarea::placeholder { color: var(--ink-soft); font-family: var(--font); }
.add-form .row { display: flex; gap: 10px; margin-top: 14px; }
.add-form .row input {
  flex: 1; padding: 10px 14px; background: var(--surface); color: var(--ink);
  border: 1px solid var(--hairline-strong); border-radius: var(--radius-md); font-size: 14px;
  font-family: var(--font); outline: none; transition: border-color 0.15s;
}
.add-form .row input:focus { border-color: var(--primary); }
.add-form .row input::placeholder { color: var(--ink-soft); }

/* ── 详情 ── */
.detail-content { max-width: 100%; }
.detail-content h2 { font-size: 22px; font-weight: 600; color: var(--ink); margin-bottom: 12px; letter-spacing: -0.3px; }
.detail-content .meta-row {
  display: flex; gap: 8px; font-size: 13px; color: var(--ink-muted); margin-bottom: 24px; flex-wrap: wrap;
}
.detail-content .meta-row span {
  background: var(--canvas); padding: 3px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--hairline);
}
.detail-content .md-body {
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: var(--radius-lg); padding: 32px 36px; line-height: 1.8; color: var(--ink-secondary); font-size: 15px;
}
.detail-content .md-body h1,.md-body h2,.md-body h3 {
  color: var(--ink); margin: 24px 0 12px; font-weight: 600;
}
.detail-content .md-body h2 { font-size: 18px; padding-bottom: 8px; border-bottom: 1px solid var(--hairline); }
.detail-content .md-body h3 { font-size: 16px; }
.detail-content .md-body code {
  background: var(--canvas); padding: 2px 6px; border-radius: 4px;
  font-size: 13px; font-family: var(--font-mono); color: var(--primary-hover);
  border: 1px solid var(--hairline);
}
.detail-content .md-body pre {
  background: var(--canvas); border: 1px solid var(--hairline);
  border-radius: var(--radius-md); padding: 18px 22px; margin: 14px 0;
  line-height: 1.55; overflow-x: auto;
}
.detail-content .md-body pre code {
  background: none; padding: 0; border: none; font-size: 13px;
  white-space: pre-wrap; word-break: break-all; color: var(--ink-secondary);
}
.detail-content .md-body p { margin: 10px 0; }
.detail-content .md-body ul,.md-body ol { padding-left: 24px; margin: 8px 0; }
.detail-content .md-body li { margin: 4px 0; }
.detail-content .md-body strong { color: var(--ink); font-weight: 600; }
.detail-content .actions { margin-top: 24px; display: flex; gap: 8px; }

/* ── 公用 ── */
.status { font-size: 13px; color: var(--ink-muted); padding: 6px 0; }
.error { font-size: 13px; color: var(--red); padding: 6px 0; }
.empty-state { color: var(--ink-muted); text-align: center; padding: 48px 20px; font-size: 14px; }
.empty-state strong { color: var(--ink-secondary); font-weight: 500; }
.spinner {
  display: inline-block; width: 14px; height: 14px; border: 2px solid var(--hairline-strong);
  border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.panel { display: none; }
.panel.active { display: block; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--hairline-strong); border-radius: 3px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>知识库</h1>
    <span class="count" id="entry-count">0 条</span>
  </div>
  <div class="sidebar-search">
    <div class="search-wrap">
      <input type="text" id="sidebar-search-input" placeholder="搜索…"
             onkeydown="if(event.key==='Enter')doAskFromSidebar()">
      <kbd>⌘K</kbd>
    </div>
  </div>
  <div class="entry-list" id="entry-list">
    <div class="empty-state"><strong>暂无条目</strong><br>切换到录入添加</div>
  </div>
</aside>

<main class="main">
  <div class="toolbar">
    <button class="tab-btn active" onclick="switchTab('ask')">问答</button>
    <button class="tab-btn" onclick="switchTab('add')">录入</button>
    <span class="spacer"></span>
    <span class="hint">Ctrl + Enter 提交</span>
  </div>

  <div class="main-content">
    <div id="panel-ask" class="panel active">
      <div class="ask-card">
        <textarea id="ask-input" placeholder="输入问题，比如：omni-upgrade 怎么用？" rows="1"></textarea>
        <div class="ask-row">
          <button class="btn btn-primary" onclick="doAsk()">提问</button>
          <span class="status" id="ask-status"></span>
        </div>
      </div>
      <div id="ask-result"></div>
    </div>

    <div id="panel-add" class="panel">
      <div class="add-form">
        <textarea id="add-content" placeholder="粘贴命令、脚本用法、工具说明……&#10;支持自然语言，AI 自动格式化为 Markdown"></textarea>
        <div class="row">
          <input type="text" id="add-title" placeholder="标题（自动生成）">
          <input type="text" id="add-tags" placeholder="标签（自动生成）">
          <button class="btn btn-primary" onclick="doAdd()">录入</button>
        </div>
        <span class="status" id="add-status"></span>
      </div>
    </div>

    <div id="panel-detail" class="panel">
      <div class="detail-content" id="detail-content"></div>
    </div>
  </div>
</main>

<script>
const API = '/api';
const AUTH = window.KB_TOKEN ? { 'X-API-Key': window.KB_TOKEN } : {};
function apiHeaders() { return { 'Content-Type': 'application/json', ...AUTH }; }
function apiCall(url, opts = {}) { return fetch(url, { ...opts, headers: { ...apiHeaders(), ...(opts.headers||{}) } }); }
let currentTab = 'ask';
let currentEntryId = null;
marked.setOptions({ breaks: true, gfm: true });

loadEntries();

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if ((name === 'ask' && b.textContent === '问答') || (name === 'add' && b.textContent === '录入'))
      b.classList.add('active');
  });
}

async function loadEntries(tag) {
  const params = new URLSearchParams({ limit: '200' });
  if (tag) params.set('tag', tag);
  try {
    const resp = await apiCall(API + '/list?' + params);
    const data = await resp.json();
    document.getElementById('entry-count').textContent = data.total + ' 条';
    renderEntryList(data.entries);
  } catch(e) {}
}

function renderEntryList(entries) {
  const el = document.getElementById('entry-list');
  if (!entries.length) {
    el.innerHTML = '<div class="empty-state"><strong>暂无条目</strong><br>切换到录入添加</div>';
    return;
  }
  let html = '';
  entries.forEach(e => {
    const title = e.title || '条目 ' + e.id;
    const activeCls = (currentEntryId === e.id) ? ' active' : '';
    html += `<div class="entry-item${activeCls}" onclick="viewEntry(${e.id})" data-id="${e.id}">
      <div class="title">${esc(title)}</div>
      <div class="meta"><span class="tags">${esc(e.tags || '—')}</span><span class="id">#${e.id}</span></div>
    </div>`;
  });
  el.innerHTML = html;
}

async function viewEntry(id) {
  currentEntryId = id;
  switchTab('detail');
  document.getElementById('detail-content').innerHTML = '<div class="status"><span class="spinner"></span>加载中…</div>';
  try {
    const resp = await apiCall(API + '/entry/' + id);
    const e = await resp.json();
    document.getElementById('detail-content').innerHTML = `
      <h2>${esc(e.title || '条目 ' + e.id)}</h2>
      <div class="meta-row">
        <span>#${e.id}</span>
        <span>${esc(e.tags || '无标签')}</span>
        <span>${e.source}</span>
      </div>
      <div class="md-body">${marked.parse(e.content)}</div>
      <div class="actions">
        <button class="btn btn-danger" onclick="deleteEntry(${e.id})">删除</button>
        <button class="btn btn-ghost" onclick="reformatEntry(${e.id})">重新格式化</button>
      </div>`;
    document.querySelectorAll('.md-body pre code').forEach(b => hljs.highlightElement(b));
    document.querySelectorAll('.entry-item').forEach(el => el.classList.remove('active'));
    const item = document.querySelector(`.entry-item[data-id="${id}"]`);
    if (item) { item.classList.add('active'); item.scrollIntoView({ block: 'nearest' }); }
  } catch(e) {
    document.getElementById('detail-content').innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
  }
}

async function deleteEntry(id) {
  if (!confirm('确定删除 #' + id + '？')) return;
  try {
    await apiCall(API + '/entry/' + id, { method: 'DELETE' });
    currentEntryId = null; switchTab('ask'); loadEntries();
  } catch(e) { alert('删除失败: ' + e.message); }
}

async function reformatEntry(id) {
  if (!confirm('用 AI 重新格式化？')) return;
  document.getElementById('detail-content').innerHTML = '<div class="status"><span class="spinner"></span>格式化中…</div>';
  try {
    await apiCall(API + '/entry/' + id + '/reformat', { method: 'POST' });
    viewEntry(id);
  } catch(e) {
    document.getElementById('detail-content').innerHTML = `<div class="error">格式化失败: ${e.message}</div>`;
  }
}

async function doAskFromSidebar() {
  const q = document.getElementById('sidebar-search-input').value.trim();
  if (!q) return;
  document.getElementById('ask-input').value = q;
  switchTab('ask'); doAsk();
}

async function doAsk() {
  const query = document.getElementById('ask-input').value.trim();
  if (!query) return;
  const status = document.getElementById('ask-status');
  const result = document.getElementById('ask-result');
  status.innerHTML = '<span class="spinner"></span> 检索中…';
  result.innerHTML = '';
  try {
    const resp = await apiCall(API + '/ask', {
      method: 'POST',
      body: JSON.stringify({ query, k: 5 })
    });
    const data = await resp.json();
    let html = `<div class="answer-block">${marked.parse(data.answer)}</div>`;
    if (data.sources && data.sources.length) {
      html += '<div class="source-label">参考条目</div>';
      data.sources.forEach(s => {
        html += `<div class="source-card" onclick="viewEntry(${s.id})">
          <div class="s-title">${esc(s.title || '条目 ' + s.id)} <span class="s-score">${(s.score*100).toFixed(0)}%</span></div>
          <div class="s-preview">${esc(s.content).substring(0, 150)}…</div>
        </div>`;
      });
    }
    result.innerHTML = html;
    status.textContent = '';
    document.querySelectorAll('.answer-block pre code').forEach(b => hljs.highlightElement(b));
  } catch(e) {
    result.innerHTML = `<div class="error">请求失败: ${e.message}</div>`;
    status.textContent = '';
  }
}

async function doAdd() {
  const content = document.getElementById('add-content').value.trim();
  if (!content) return;
  const title = document.getElementById('add-title').value.trim();
  const tags = document.getElementById('add-tags').value.trim();
  const status = document.getElementById('add-status');
  status.innerHTML = '<span class="spinner"></span> AI 正在格式化…';
  try {
    const resp = await apiCall(API + '/add', {
      method: 'POST',
      body: JSON.stringify({ content, title, tags, auto_meta: true, format_md: true })
    });
    const data = await resp.json();
    status.textContent = `已录入 #${data.id} — ${data.title}`;
    document.getElementById('add-content').value = '';
    document.getElementById('add-title').value = '';
    document.getElementById('add-tags').value = '';
    loadEntries();
    setTimeout(() => viewEntry(data.id), 300);
  } catch(e) {
    status.textContent = '失败: ' + e.message;
  }
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    if (currentTab === 'ask') doAsk();
    else if (currentTab === 'add') doAdd();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('sidebar-search-input').focus();
  }
});
</script>
</body>
</html>
