<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KB — 个人知识库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
:root {
  --canvas: #1a1a1a; --canvas-soft: #1e1e1e; --surface: #242424;
  --surface-strong: #2e2e2e; --hairline: #2e2e2e; --hairline-soft: #333;
  --hairline-strong: #3a3a3a; --ink: #e4e4e4; --ink-secondary: #b0b0b0;
  --ink-muted: #808080; --ink-soft: #606060;
  --primary: #f56e3a; --primary-hover: #e05a28; --green: #4ec992;
  --red: #f0616b; --yellow: #e0a840;
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
  --font: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font); background: var(--canvas); color: var(--ink-secondary);
  height: 100vh; overflow: hidden; display: flex; font-size: 14px;
  line-height: 1.6; -webkit-font-smoothing: antialiased;
}

/* ── 登录页 ── */
.login-page {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--canvas); z-index: 100;
}
.login-card {
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: var(--radius-lg); padding: 40px; width: 380px; text-align: center;
}
.login-card h1 { font-size: 20px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
.login-card p { font-size: 13px; color: var(--ink-muted); margin-bottom: 24px; }
.login-card input {
  width: 100%; padding: 12px 16px; background: var(--canvas); color: var(--ink);
  border: 1px solid var(--hairline-strong); border-radius: var(--radius-md);
  font-size: 14px; font-family: var(--font-mono); outline: none; text-align: center;
  transition: border-color 0.15s;
}
.login-card input:focus { border-color: var(--primary); }
.login-card input::placeholder { color: var(--ink-soft); }
.login-card .btn {
  margin-top: 16px; width: 100%; padding: 12px; border-radius: var(--radius-md);
  font-size: 14px; font-family: var(--font); font-weight: 500; cursor: pointer;
  border: none; background: var(--primary); color: #fff;
}
.login-card .btn:hover { background: var(--primary-hover); }
.login-card .error { font-size: 13px; color: var(--red); margin-top: 12px; display: none; }

/* ── 主布局 ── */
.main-layout { display: flex; width: 100%; height: 100vh; display: none; }
.main-layout.active { display: flex; }

/* ── 侧栏 ── */
.sidebar {
  width: 300px; min-width: 300px; background: var(--canvas-soft);
  border-right: 1px solid var(--hairline);
  display: flex; flex-direction: column; height: 100vh;
}
.sidebar-header {
  padding: 20px; display: flex; align-items: center; justify-content: space-between;
}
.sidebar-header h1 { font-size: 18px; font-weight: 600; color: var(--ink); }
.sidebar-header .count { font-size: 12px; color: var(--ink-muted); }
.sidebar-search {
  padding: 0 16px 14px;
}
.sidebar-search .search-wrap {
  display: flex; align-items: center; background: var(--surface);
  border: 1px solid var(--hairline-strong); border-radius: var(--radius-md);
  padding: 0 12px; height: 38px; transition: border-color 0.15s;
}
.sidebar-search .search-wrap:focus-within { border-color: var(--primary); }
.sidebar-search input {
  flex: 1; background: none; border: none; color: var(--ink);
  font-family: var(--font); font-size: 13px; outline: none;
}
.sidebar-search input::placeholder { color: var(--ink-soft); }
.sidebar-search kbd {
  font-size: 11px; color: var(--ink-soft); font-family: var(--font-mono);
  background: var(--surface-strong); padding: 2px 6px; border-radius: 4px;
  border: 1px solid var(--hairline);
}
.entry-list { flex: 1; overflow-y: auto; }
.entry-item {
  padding: 12px 20px; cursor: pointer; transition: background 0.1s;
  border-left: 2px solid transparent;
}
.entry-item:hover { background: rgba(255,255,255,0.03); }
.entry-item.active { background: rgba(245,110,58,0.06); border-left-color: var(--primary); }
.entry-item .title {
  font-size: 13px; font-weight: 500; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.entry-item .meta {
  font-size: 11px; color: var(--ink-muted); margin-top: 2px;
  display: flex; gap: 6px; align-items: center;
}
.entry-item .tags { color: var(--green); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entry-item .id { flex-shrink: 0; }

/* ── 主区域 ── */
.main {
  flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
.toolbar {
  height: 48px; padding: 0 24px; border-bottom: 1px solid var(--hairline);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0; background: var(--canvas-soft);
}
.toolbar .spacer { flex: 1; }
.main-content { flex: 1; overflow-y: auto; padding: 32px 40px; }

/* ── 按钮 ── */
.btn {
  padding: 6px 14px; border-radius: var(--radius-sm); font-size: 13px;
  font-family: var(--font); font-weight: 500; cursor: pointer; border: none;
  transition: all 0.1s; height: 32px; display: inline-flex; align-items: center; gap: 5px;
}
.btn-ghost { background: transparent; color: var(--ink-muted); border: 1px solid var(--hairline); }
.btn-ghost:hover { background: var(--surface-strong); color: var(--ink); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(240,97,107,0.2); }
.btn-danger:hover { background: rgba(240,97,107,0.08); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-copy { background: var(--surface-strong); color: var(--ink); border: 1px solid var(--hairline-strong); }
.btn-copy:hover { background: var(--hairline-strong); }
.btn-logout { background: transparent; color: var(--ink-muted); }
.btn-logout:hover { color: var(--ink); }

/* ── 详情 ── */
.empty-detail {
  color: var(--ink-muted); text-align: center; padding: 80px 20px; font-size: 14px;
}
.empty-detail strong { color: var(--ink-secondary); }
.detail-content { max-width: 100%; }
.detail-content h2 { font-size: 22px; font-weight: 600; color: var(--ink); margin-bottom: 12px; }
.detail-content .meta-row {
  display: flex; gap: 8px; font-size: 12px; color: var(--ink-muted); margin-bottom: 24px; flex-wrap: wrap;
}
.detail-content .meta-row span {
  background: var(--canvas); padding: 3px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--hairline);
}
.md-body {
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: var(--radius-lg); padding: 28px 32px; line-height: 1.8; color: var(--ink-secondary); font-size: 15px;
}
.md-body h1,.md-body h2,.md-body h3 { color: var(--ink); margin: 20px 0 10px; font-weight: 600; }
.md-body h2 { font-size: 17px; padding-bottom: 8px; border-bottom: 1px solid var(--hairline); }
.md-body h3 { font-size: 15px; }
.md-body code {
  background: var(--canvas); padding: 2px 6px; border-radius: 4px;
  font-size: 13px; font-family: var(--font-mono); color: var(--primary);
  border: 1px solid var(--hairline);
}
.md-body pre {
  background: var(--canvas); border: 1px solid var(--hairline);
  border-radius: var(--radius-md); padding: 16px 20px; margin: 12px 0;
  line-height: 1.55; overflow-x: auto;
}
.md-body pre code {
  background: none; padding: 0; border: none; font-size: 13px;
  white-space: pre-wrap; word-break: break-all; color: var(--ink-secondary);
}
.md-body p { margin: 10px 0; }
.md-body ul,.md-body ol { padding-left: 22px; margin: 8px 0; }
.md-body li { margin: 4px 0; }
.md-body strong { color: var(--ink); font-weight: 600; }
.detail-content .actions { margin-top: 20px; display: flex; gap: 8px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface-strong); color: var(--ink); padding: 10px 20px;
  border-radius: var(--radius-md); font-size: 13px; border: 1px solid var(--hairline-strong);
  z-index: 200; opacity: 0; transition: opacity 0.2s;
}
.toast.show { opacity: 1; }
.toast.success { border-color: var(--green); }

/* ── 公用 ── */
.status { font-size: 13px; color: var(--ink-muted); padding: 6px 0; }
.error { font-size: 13px; color: var(--red); padding: 6px 0; }
.spinner {
  display: inline-block; width: 14px; height: 14px; border: 2px solid var(--hairline-strong);
  border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-strong); border-radius: 3px; }
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-page" id="login-page">
  <div class="login-card">
    <h1>KB 知识库</h1>
    <p>输入访问密钥</p>
    <input type="password" id="login-input" placeholder="API Key" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">登录</button>
    <div class="error" id="login-error">密钥错误</div>
  </div>
</div>

<!-- 主布局 -->
<div class="main-layout" id="main-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>知识库</h1>
      <span class="count" id="entry-count">0 条</span>
    </div>
    <div class="sidebar-search">
      <div class="search-wrap">
        <input type="text" id="sidebar-search-input" placeholder="搜索…" oninput="doSearch()">
        <kbd>⌘K</kbd>
      </div>
    </div>
    <div class="entry-list" id="entry-list">
      <div class="empty-detail"><strong>暂无条目</strong></div>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <button class="btn btn-primary" onclick="copyPrompt()">📋 复制提示词</button>
      <span class="spacer"></span>
      <button class="btn btn-logout" onclick="doLogout()">退出</button>
    </div>
    <div class="main-content" id="main-content">
      <div class="empty-detail">
        <strong>← 从左侧选择条目查看</strong><br><br>
        <span style="font-size:12px;color:var(--ink-soft)">Agent 可通过 API 自动录入和查询</span>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let token = '';
let currentEntryId = null;
let allEntries = [];
marked.setOptions({ breaks: true, gfm: true });

// ── 登录 ──
const loginPage = document.getElementById('login-page');
const mainLayout = document.getElementById('main-layout');

if (sessionStorage.getItem('kb_token')) {
  token = sessionStorage.getItem('kb_token');
  showMain();
} else {
  document.getElementById('login-input').focus();
}

async function doLogin() {
  const key = document.getElementById('login-input').value.trim();
  if (!key) return;
  const errEl = document.getElementById('login-error');
  try {
    const resp = await fetch(API + '/list?limit=1', { headers: { 'X-API-Key': key } });
    if (resp.ok) {
      token = key;
      sessionStorage.setItem('kb_token', token);
      errEl.style.display = 'none';
      showMain();
    } else {
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.style.display = 'block';
  }
}

function showMain() {
  loginPage.style.display = 'none';
  mainLayout.classList.add('active');
  loadEntries();
}

function doLogout() {
  sessionStorage.removeItem('kb_token');
  token = '';
  allEntries = [];
  currentEntryId = null;
  mainLayout.classList.remove('active');
  loginPage.style.display = 'flex';
  document.getElementById('login-input').value = '';
  document.getElementById('login-input').focus();
  document.getElementById('entry-list').innerHTML = '<div class="empty-detail"><strong>暂无条目</strong></div>';
  document.getElementById('main-content').innerHTML = '<div class="empty-detail"><strong>← 从左侧选择条目查看</strong></div>';
}

// ── 数据加载 ──
async function loadEntries() {
  try {
    const resp = await fetch(API + '/list?limit=200', { headers: { 'X-API-Key': token } });
    const data = await resp.json();
    allEntries = data.entries;
    document.getElementById('entry-count').textContent = data.total + ' 条';
    renderEntries(allEntries);
  } catch(e) {
    document.getElementById('entry-list').innerHTML = '<div class="error">加载失败</div>';
  }
}

function renderEntries(entries) {
  const el = document.getElementById('entry-list');
  if (!entries.length) {
    el.innerHTML = '<div class="empty-detail"><strong>暂无条目</strong></div>';
    return;
  }
  let html = '';
  entries.forEach(e => {
    const title = e.title || '条目 ' + e.id;
    const activeCls = (currentEntryId === e.id) ? ' active' : '';
    const shortTags = (e.tags || '—').split(',').slice(0,3).join(',');
    html += `<div class="entry-item${activeCls}" onclick="viewEntry(${e.id})" data-id="${e.id}">
      <div class="title">${esc(title)}</div>
      <div class="meta"><span class="tags">${esc(shortTags)}</span><span class="id">#${e.id}</span></div>
    </div>`;
  });
  el.innerHTML = html;
}

function doSearch() {
  const q = document.getElementById('sidebar-search-input').value.trim().toLowerCase();
  if (!q) { renderEntries(allEntries); return; }
  const filtered = allEntries.filter(e => {
    const haystack = (e.title + ' ' + e.tags + ' ' + e.content).toLowerCase();
    return haystack.includes(q);
  });
  renderEntries(filtered);
}

// ── 查看条目 ──
async function viewEntry(id) {
  currentEntryId = id;
  document.getElementById('main-content').innerHTML = '<div class="status"><span class="spinner"></span>加载中…</div>';
  try {
    const resp = await fetch(API + '/entry/' + id, { headers: { 'X-API-Key': token } });
    const e = await resp.json();
    const date = e.updated_at ? new Date(e.updated_at * 1000).toLocaleString('zh-CN') : '—';
    document.getElementById('main-content').innerHTML = `
      <div class="detail-content">
        <h2>${esc(e.title || '条目 ' + e.id)}</h2>
        <div class="meta-row">
          <span>#${e.id}</span>
          <span>${esc(e.tags || '无标签')}</span>
          <span>${e.source}</span>
          <span>更新于 ${date}</span>
        </div>
        <div class="md-body">${marked.parse(e.content)}</div>
        <div class="actions">
          <button class="btn btn-danger" onclick="deleteEntry(${e.id})">删除</button>
          <button class="btn btn-ghost" onclick="reformatEntry(${e.id})">重新格式化</button>
        </div>
      </div>`;
    document.querySelectorAll('.md-body pre code').forEach(b => hljs.highlightElement(b));
    // 高亮侧栏
    document.querySelectorAll('.entry-item').forEach(el => el.classList.remove('active'));
    const item = document.querySelector(`.entry-item[data-id="${id}"]`);
    if (item) { item.classList.add('active'); item.scrollIntoView({ block: 'nearest' }); }
  } catch(e) {
    document.getElementById('main-content').innerHTML = '<div class="error">加载失败</div>';
  }
}

async function deleteEntry(id) {
  if (!confirm('确定删除 #' + id + '？')) return;
  try {
    await fetch(API + '/entry/' + id, { method: 'DELETE', headers: { 'X-API-Key': token } });
    currentEntryId = null;
    loadEntries();
    document.getElementById('main-content').innerHTML = '<div class="empty-detail"><strong>← 从左侧选择条目查看</strong></div>';
  } catch(e) { alert('删除失败'); }
}

async function reformatEntry(id) {
  if (!confirm('用 AI 重新格式化？')) return;
  document.getElementById('main-content').innerHTML = '<div class="status"><span class="spinner"></span>格式化中…</div>';
  try {
    await fetch(API + '/entry/' + id + '/reformat', { method: 'POST', headers: { 'X-API-Key': token } });
    viewEntry(id);
  } catch(e) {
    document.getElementById('main-content').innerHTML = '<div class="error">格式化失败</div>';
  }
}

// ── 复制提示词（内容由后端 /api/prompt 统一生成）──
async function copyPrompt() {
  try {
    const resp = await fetch(API + '/prompt?base=' + encodeURIComponent(window.location.origin),
                             { headers: { 'X-API-Key': token } });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    await navigator.clipboard.writeText(data.prompt);
    showToast('✅ 已复制提示词，粘贴到其他 AI 对话中即可');
  } catch(e) {
    showToast('❌ 复制失败，请手动复制');
  }
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show success';
  setTimeout(() => { t.className = 'toast'; }, 2500);
}

// ── 工具 ──
function esc(s) {
  const div = document.createElement('div');
  div.textContent = s || '';
  return div.innerHTML;
}

// ── 快捷键 ──
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('sidebar-search-input').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('sidebar-search-input').value = '';
    doSearch();
  }
});
</script>
</body>
</html>
